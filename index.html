<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paradise Vendas | Dashboard</title>
    <meta name="description" content="Dashboard de acompanhamento de vendas - Paradise">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='10' y='60' width='15' height='30' rx='3' fill='%233b82f6'/><rect x='30' y='40' width='15' height='50' rx='3' fill='%238b5cf6'/><rect x='50' y='25' width='15' height='65' rx='3' fill='%2310b981'/><rect x='70' y='10' width='15' height='80' rx='3' fill='%23f59e0b'/></svg>">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
    <header class="header">
        <h1>Paradise Vendas</h1>
        <div class="header-controls">
            <select id="month"></select>
            <select id="year"></select>
            <button class="btn btn-sm" id="compareToggle" onclick="toggleCompare()">Comparar</button>
            <div class="compare-controls" id="compareControls">
                <span class="compare-vs">vs</span>
                <select id="month2"></select>
                <select id="year2"></select>
            </div>
            <div class="filter-group">
                <button class="filter-btn active" data-filter="all" onclick="setChannelFilter('all')">Todos</button>
                <button class="filter-btn" data-filter="loja" onclick="setChannelFilter('loja')">Loja</button>
                <button class="filter-btn" data-filter="site" onclick="setChannelFilter('site')">Site</button>
            </div>
            <button class="btn btn-primary" onclick="refreshData()">Atualizar</button>
            <button class="btn btn-sm" onclick="openVendorModal()">+ Vendedor</button>
            <button class="theme-toggle" onclick="toggleTheme()" id="themeToggle" title="Alternar tema"></button>
            <span id="lastUpdate" class="last-update"></span>
            <span class="auto-badge" id="autoLabel">Auto 1min</span>
        </div>
    </header>

    <main class="dashboard">
        <!-- Skeleton Loading -->
        <div id="loading">
            <div class="skeleton-container">
                <div class="skeleton-kpis">
                    <div class="skeleton skeleton-kpi" style="border-radius:1rem"></div>
                    <div class="skeleton skeleton-kpi" style="border-radius:1rem"></div>
                    <div class="skeleton skeleton-kpi" style="border-radius:1rem"></div>
                    <div class="skeleton skeleton-kpi" style="border-radius:1rem"></div>
                </div>
                <div class="skeleton-section">
                    <div class="skeleton skeleton-title" style="border-radius:0.5rem"></div>
                    <div class="skeleton-cards">
                        <div class="skeleton skeleton-card" style="border-radius:0.75rem"></div>
                        <div class="skeleton skeleton-card" style="border-radius:0.75rem"></div>
                        <div class="skeleton skeleton-card" style="border-radius:0.75rem"></div>
                    </div>
                    <div class="skeleton skeleton-chart" style="border-radius:0.75rem"></div>
                </div>
                <div class="skeleton-section">
                    <div class="skeleton skeleton-title" style="border-radius:0.5rem"></div>
                    <div class="skeleton-cards">
                        <div class="skeleton skeleton-card" style="border-radius:0.75rem"></div>
                        <div class="skeleton skeleton-card" style="border-radius:0.75rem"></div>
                        <div class="skeleton skeleton-card" style="border-radius:0.75rem"></div>
                    </div>
                    <div class="skeleton skeleton-chart" style="border-radius:0.75rem"></div>
                </div>
            </div>
        </div>

        <!-- Content -->
        <div id="content" style="display:none">
            <div class="global-kpis" id="globalKpis"></div>
            <div id="vendorSections"></div>
            <div class="charts-grid" id="chartsArea">
                <div class="chart-box"><h3>Vendas Totais por Vendedor</h3><canvas id="chartTotals"></canvas></div>
                <div class="chart-box"><h3>Ticket Médio por Vendedor</h3><canvas id="chartTicket"></canvas></div>
                <div class="chart-box"><h3>Clientes Atendidos por Vendedor</h3><canvas id="chartClients"></canvas></div>
                <div class="chart-box"><h3>Loja vs Site (Consolidado)</h3><canvas id="chartPieGlobal"></canvas></div>
                <div class="chart-box"><h3>Média de Vendas por Dia da Semana</h3><canvas id="chartWeekday"></canvas></div>
                <div class="chart-box" style="grid-column: 1 / -1"><h3>Evolução Mensal <span id="yearlyLabel" style="font-weight:400"></span></h3><canvas id="chartYearly"></canvas></div>
            </div>
        </div>
    </main>

    <!-- Modal: Adicionar Vendedor -->
    <div id="vendorModal" class="modal-overlay" style="display:none">
        <div class="modal">
            <h2>Adicionar Vendedor</h2>
            <label class="modal-label">Nome do Vendedor</label>
            <input id="vendorName" placeholder="Ex: João" />
            <label class="modal-label">ID da Planilha Google Sheets</label>
            <input id="vendorSheetId" placeholder="Ex: 1GTBw9T4Y3W8of3faSXgx..." />
            <p class="modal-hint">Copie o ID da URL da planilha: docs.google.com/spreadsheets/d/<b>ID_AQUI</b>/edit</p>
            <div class="modal-actions">
                <button class="btn" onclick="closeVendorModal()">Cancelar</button>
                <button class="btn btn-primary" onclick="addVendor()">Adicionar</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
